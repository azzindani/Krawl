name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  # ── Run full CI first ───────────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── Build release artifacts per platform ────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: krawl-linux
          - os: macos-latest
            artifact_name: krawl-macos
          - os: windows-latest
            artifact_name: krawl-windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify build
        run: npx tsc --noEmit

      - name: Run full test suite
        run: npx vitest run

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          # Copy source files (tsx executes TS directly, no compile step needed)
          cp -r config core workers resilience db output tasks krawl.ts \
                package.json package-lock.json tsconfig.json \
                install.sh run.sh README.md \
                dist/${{ matrix.artifact_name }}/ 2>/dev/null || true
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz
          retention-days: 30

  # ── Create GitHub Release ───────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Krawl ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/krawl-linux/krawl-linux.tar.gz
            artifacts/krawl-macos/krawl-macos.tar.gz
            artifacts/krawl-windows/krawl-windows.tar.gz
